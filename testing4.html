            -moz-osx-font-smoothing: grayscale;
            background-color: #000000;

        /* Liquid Glass CSS */
        .liquid-glass {
            background: rgba(0, 0, 0, 0.4);
            background-blend-mode: luminosity;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: none;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .liquid-glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.4px;
            background: linear-gradient(180deg,
                rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 20%,
                rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%,
                rgba(255,255,255,0.1) 80%, rgba(255,255,255,0.3) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
</head>

    <!-- Script Block for Core Interactions & Character Stagger Animations -->
    <script>
        // Character-by-character entrance animation logic
        function initAnimatedHeading() {
            const heading = document.getElementById('animated-heading');
            if (!heading) return;
            
            // Text to split (literal \n line break between 'tomorrow' and 'with')
            const text = "Shaping tomorrow\nwith base and code.";
            const lines = text.split('\n');
            heading.innerHTML = '';
            
            const charDelay = 30; // ms
            const initialDelay = 200; // ms
            
            lines.forEach((line, lineIndex) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'block overflow-visible';
                
                const chars = [...line];
                const lineLength = chars.length;
                
                chars.forEach((char, charIndex) => {
                    const charSpan = document.createElement('span');
                    // Start state: opacity 0, translateX -18px
                    charSpan.className = 'inline-block opacity-0 transform -translate-x-[18px] transition-all duration-500 ease-out';
                    
                    // Render spaces as \u00A0 (non-breaking space)
                    if (char === ' ') {
                        charSpan.textContent = '\u00A0';
                    } else {
                        charSpan.textContent = char;
                    }
                    
                    // Stagger delay calculation formula
                    const delay = initialDelay + (lineIndex * lineLength * charDelay) + (charIndex * charDelay);
                    charSpan.style.transitionDelay = `${delay}ms`;
                    
                    lineDiv.appendChild(charSpan);
                });
                
                heading.appendChild(lineDiv);
            });
            
            // Trigger character entry transition via CSS state update after tiny boot time
            setTimeout(() => {
                const spans = heading.querySelectorAll('span');
                spans.forEach(span => {
                    span.classList.remove('opacity-0', '-translate-x-[18px]');
                    span.classList.add('opacity-100', 'translate-x-0');
                });
            }, 50);
        }

        // Fade-in timing components initialization
        function initFadeInComponents() {
            const fadeElements = document.querySelectorAll('[data-fade-in-delay]');
            fadeElements.forEach(el => {
                const delay = parseInt(el.getAttribute('data-fade-in-delay')) || 0;
                const duration = parseInt(el.getAttribute('data-fade-in-duration')) || 1000;
                
                // Assign configurable duration as inline transitionDuration style
                el.style.transitionDuration = `${duration}ms`;
                
                // setTimeout delay trigger
                setTimeout(() => {
                    el.classList.remove('opacity-0');
                    el.classList.add('opacity-100');
                }, delay);
            });
        }

        // Bootstrapper
        window.addEventListener('DOMContentLoaded', () => {
            initAnimatedHeading();
            initFadeInComponents();
        });
    </script>
